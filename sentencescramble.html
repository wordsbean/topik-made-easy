<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Scramble — TOPIK Made Easy</title>
<link rel="icon" href="images/icons/icon-192.png">
<link rel="stylesheet" href="css/nav-hangul.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Song+Myung&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/sentencescramble.css">
</head>
<body>

<header class="screen-only">
  <h1>🔀 문장 스크램블
    <span class="puzzle-level" id="levelBadge">-</span>
    <span class="puzzle-batch-number" id="batchBadge">-</span>
  </h1>
</header>

<h2 class="puzzle-title" id="printTitle">Sentence Scramble</h2>

<div class="ss-toolbar screen-only" id="ssToolbar"></div>

<div class="ss-loading" id="ssLoading">데이터를 불러오는 중...</div>
<div class="ss-grid" id="ssGrid"></div>

<div id="answerGrid" class="answer-grid"></div>

<div id="imgLightbox" class="img-lightbox">
  <img id="lightboxImg" src="" alt="">
</div>

<div class="pagination-controls screen-only" id="pagCtrl" style="display:none;">
  <select id="gradeSelect" class="ss-grade-select">
    <option value="1">1급</option>
    <option value="2">2급</option>
    <option value="3">3급</option>
    <option value="4">4급</option>
    <option value="5">5급</option>
    <option value="6">6급</option>
  </select>
  <button id="newPuzzleBtn" class="nav-button" data-i18n="newPuzzle">새 퍼즐 만들기</button>
  <button id="toggleAnswerBtn" class="nav-button" data-i18n="showAnswer">정답 보기</button>
  <button id="printBtn" class="nav-button" data-i18n="print">인쇄</button>
</div>

<script src="js/lang-pref-hangul.js"></script>
<script src="js/ui-i18n-hangul.js"></script>
<script src="js/speak.js"></script>
<script src="js/romanize.js"></script>
<script src="js/roman-toggle.js"></script>
<script src="js/translate-helper.js"></script>
<script>
(function () {

  // =========================================================
  // 0) TOPIK 데이터 로딩
  // =========================================================
  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = () => reject(new Error('스크립트 로드 실패: ' + src));
      document.head.appendChild(s);
    });
  }

  async function loadTopikData(langCode) {
    const scripts = ['data/topik_core.js', 'data/nvsentences.js'];
    const useStatic = (typeof isStaticLangSupported === 'function') ? isStaticLangSupported(langCode) : (langCode !== 'en');
    if (useStatic) scripts.push('data/topik_lang_' + langCode + '.js');
    await Promise.all(scripts.map(loadScript));
    const langData = useStatic ? window['TOPIK_LANG_' + langCode.toUpperCase()] : null;
    return TOPIK_CORE.map(w => ({
      ...w,
      nativeWord: langData && langData[w.id] ? langData[w.id].word : null,
      nativeMeaning: langData && langData[w.id] ? langData[w.id].meaning : (w.engMeaning || ''),
      nv: (typeof NV_SENTENCES !== 'undefined' && NV_SENTENCES[w.id]) ? NV_SENTENCES[w.id] : null,
    }));
  }

  // 10개국(정적 지원)이 아닌 "기타 언어"일 때만: 이번에 뽑힌 문제 카드들만 실시간 번역으로 채움
  async function fillExtraLangHints(items, langCode) {
    const useStatic = (typeof isStaticLangSupported === 'function') ? isStaticLangSupported(langCode) : false;
    if (useStatic || langCode === 'en' || typeof getNativeWordMeaning !== 'function') return;
    await Promise.all(items.map(async (item, idx) => {
      const result = await getNativeWordMeaning(item.id, item.word, item.engMeaning, langCode, null);
      item.nativeWord = result.word;
      item.nativeMeaning = result.meaning;
      const hintEl = ssGrid.querySelector(`.ss-card[data-item="${idx}"] .ss-hint`);
      if (hintEl && result.word) hintEl.innerHTML = `${item.engWord || ''}<span class="native">· ${result.word}</span>`;
      const cell = answerGridEl.querySelector(`tr[data-item="${idx}"] .cell-native`);
      if (cell && result.word) cell.textContent = result.word;
    }));
  }

  function isDismissed(id) {
    return JSON.parse(localStorage.getItem('topik_dismissed') || '[]').includes(id);
  }

  // =========================================================
  // 1) 설정
  // =========================================================
  const ITEMS_PER_PAGE = 4;
  const MIN_WORDS = 3;   // 문장 최소 단어(어절) 수
  const MAX_WORDS = 10;  // 너무 긴 문장은 카드에서 다루기 부담스러워 우선순위에서 밀어냄

  const ssGrid = document.getElementById('ssGrid');
  const ssLoading = document.getElementById('ssLoading');
  const levelBadge = document.getElementById('levelBadge');
  const batchBadge = document.getElementById('batchBadge');
  const printTitle = document.getElementById('printTitle');
  const toggleAnswerBtn = document.getElementById('toggleAnswerBtn');
  const answerGridEl = document.getElementById('answerGrid');
  const lightbox = document.getElementById('imgLightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const gradeSelect = document.getElementById('gradeSelect');

  let WORDS = [];
  let puzzleCount = 0;
  let currentGrade = (typeof getSavedGrade === 'function') ? String(getSavedGrade()) : '1';
  let currentLang = 'en';
  let currentItems = []; // { id, word, roman, engWord, nativeWord, image, grade, korSentence, engSentence, tokens:[{text,origIndex}], nextIndex }

  // =========================================================
  // 2) 후보 문장 풀: 어절 3개 이상, 영어예문 있는 쪽을 우선
  // =========================================================
  function candidateSentences(w) {
    const out = [];
    if (w.nv && Array.isArray(w.nv.pos)) {
      w.nv.pos.forEach(p => { if (p.kor) out.push({ kor: p.kor.trim(), eng: p.eng || '' }); });
    }
    if (Array.isArray(w.examplesKor)) {
      w.examplesKor.forEach(k => { if (k) out.push({ kor: k.trim(), eng: '' }); });
    }
    return out
      .map(c => ({ ...c, wordCount: c.kor.split(/\s+/).length }))
      .filter(c => c.wordCount >= MIN_WORDS)
      .sort((a, b) => {
        const scoreA = (a.eng ? 1000 : 0) - Math.abs(a.wordCount - 6);
        const scoreB = (b.eng ? 1000 : 0) - Math.abs(b.wordCount - 6);
        return scoreB - scoreA;
      });
  }

  function buildSentencePool() {
    const seenSentences = new Set();
    const pool = [];
    for (const w of WORDS) {
      if (String(w.grade || '').charAt(0) !== currentGrade) continue;
      if (isDismissed(w.id)) continue;
      const cands = candidateSentences(w);
      const pick = cands.find(c => !seenSentences.has(c.kor));
      if (!pick) continue;
      seenSentences.add(pick.kor);
      pool.push({ ...w, korSentence: pick.kor, engSentence: pick.eng });
    }
    return pool;
  }

  function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function pickRandom(pool, count) {
    return shuffleArray(pool).slice(0, count);
  }

  // =========================================================
  // 3) 렌더링
  // =========================================================
  function renderPuzzle() {
    const pool = buildSentencePool();
    if (!pool.length) {
      ssGrid.innerHTML = '<div class="ss-loading">이 급수에는 문장 스크램블용 예문이 아직 없어요.</div>';
      answerGridEl.innerHTML = '';
      return;
    }
    const picks = pickRandom(pool, Math.min(ITEMS_PER_PAGE, pool.length));

    currentItems = picks.map(item => {
      const words = item.korSentence.split(/\s+/);
      const tokens = words.map((text, origIndex) => ({ text, origIndex }));
      return { ...item, tokens, nextIndex: 0 };
    });

    puzzleCount++;
    levelBadge.textContent = (typeof tGradeBadge === 'function') ? tGradeBadge(currentGrade) : currentGrade + '급';
    batchBadge.textContent = (typeof tBatchBadge === 'function') ? tBatchBadge(puzzleCount) : `제 ${puzzleCount}회`;
    printTitle.textContent = `🔀 ${typeof t === 'function' ? t('navSentencescramble') : '문장 스크램블'} · ${tGradeBadge(currentGrade)} ${tBatchBadge(puzzleCount)}`;

    ssGrid.innerHTML = currentItems.map((item, idx) => {
      const thumb = item.image ? `<img class="ss-thumb" src="images/${item.image}" alt="${item.word}" data-word="${item.word}" onerror="this.remove()">` : '';
      const romanHint = (typeof romanizeSentence === 'function') ? romanizeSentence(item.korSentence) : '';

      const slotsHtml = item.tokens.map((t, i) =>
        `<span class="ss-slot${i === 0 ? ' is-next' : ''}" data-item="${idx}" data-slot="${i}"></span>`
      ).join('');

      const scrambled = shuffleArray(item.tokens);
      const bankHtml = scrambled.map(t => {
        const tilt = (Math.random() * 12 - 6).toFixed(1);
        return `<button type="button" class="ss-word-block" style="--tilt:${tilt}deg; transform:rotate(${tilt}deg);" data-item="${idx}" data-origindex="${t.origIndex}">${t.text}</button>`;
      }).join('');

      return `
        <div class="ss-card" data-item="${idx}">
          <div class="ss-card-top">
            ${thumb}
            <div>
              <span class="ss-item-number">${idx + 1}.</span>
              <span class="ss-hint">${item.engWord || ''}${item.nativeWord ? '<span class="native">· ' + item.nativeWord + '</span>' : ''}</span>
            </div>
            <div class="ss-controls">
              <button type="button" class="ss-speak-btn" data-sentence="${item.korSentence.replace(/"/g, '&quot;')}" title="문장 듣기">🔊</button>
            </div>
          </div>
          ${romanHint ? `<p class="ss-roman-hint">${romanHint}</p>` : ''}
          ${item.engSentence ? `<p class="ss-eng-hint">${item.engSentence}</p>` : ''}
          <p class="ss-native-hint" style="display:none;"></p>
          <div class="ss-slot-row">${slotsHtml}</div>
          <div class="ss-word-bank">${bankHtml}</div>
          <div class="ss-item-status" id="ssStatus${idx}"></div>
        </div>
      `;
    }).join('');

    renderAnswerGrid(currentItems);
    fillExtraLangHints(currentItems, currentLang);
    bindInteractions();
  }

  // =========================================================
  // 4) 상호작용
  // =========================================================
  function bindInteractions() {
    ssGrid.querySelectorAll('.ss-word-block').forEach(block => {
      block.addEventListener('click', () => {
        const itemIdx = Number(block.dataset.item);
        const origIndex = Number(block.dataset.origindex);
        const item = currentItems[itemIdx];

        if (origIndex === item.nextIndex) {
          const slot = ssGrid.querySelector(`.ss-slot[data-item="${itemIdx}"][data-slot="${origIndex}"]`);
          slot.textContent = block.textContent;
          slot.classList.add('is-filled');
          slot.classList.remove('is-next');
          block.classList.add('is-placed');

          item.nextIndex++;
          const nextSlot = ssGrid.querySelector(`.ss-slot[data-item="${itemIdx}"][data-slot="${item.nextIndex}"]`);
          if (nextSlot) nextSlot.classList.add('is-next');

          if (item.nextIndex >= item.tokens.length) {
            document.getElementById(`ssStatus${itemIdx}`).textContent = '✓ 완성!';
            speakKorean(item.korSentence);
          }
        } else {
          block.classList.remove('is-wrong');
          void block.offsetWidth;
          block.classList.add('is-wrong');
          setTimeout(() => block.classList.remove('is-wrong'), 350);
        }
      });
    });

    ssGrid.querySelectorAll('.ss-speak-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        speakKorean(btn.dataset.sentence);
        const nativeEl = btn.closest('.ss-card').querySelector('.ss-native-hint');
        if (typeof fillTranslationOnce === 'function') fillTranslationOnce(nativeEl, btn.dataset.sentence);
      });
    });

    ssGrid.querySelectorAll('.ss-thumb[data-word]').forEach(img => {
      img.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightbox.classList.add('is-open');
        speakKorean(img.dataset.word);
      });
    });
  }

  // =========================================================
  // 5) 정답 요약 표
  // =========================================================
  function renderAnswerGrid(items) {
    const rows = items.map((w, idx) => {
      const thumbImg = w.image ? `<img src="images/${w.image}" alt="${w.word}" onerror="this.remove()">` : '';
      return `
        <tr data-item="${idx}">
          <td class="cell-thumb">${thumbImg}</td>
          <td class="cell-word">${w.word}<div class="cell-pronun">${w.roman || ''}</div></td>
          <td>${w.engWord || ''}</td>
          <td>${w.korSentence}</td>
          <td>${w.engSentence || ''}</td>
          <td class="cell-native">${w.nativeWord || w.nativeMeaning || ''}</td>
        </tr>
      `;
    }).join('');

    answerGridEl.innerHTML = `
      <div class="answer-grid-header">
        <h3>${typeof t === 'function' ? t('answerSummary') : '정답 요약'}</h3>
        <span><button type="button" class="answer-speak-btn" id="answerSpeakBtn" title="전체듣기">🔊</button></span>
      </div>
      <table>
        <thead><tr><th class="cell-thumb"></th><th>${typeof t === 'function' ? t('colWord') : '단어'}</th><th>${typeof t === 'function' ? t('colEnglish') : '영어'}</th><th>${typeof t === 'function' ? t('colSentence') : '문장'}</th><th>${typeof t === 'function' ? t('colSentenceTranslation') : '영어해석'}</th><th>${typeof t === 'function' ? t('colNative') : '모국어'}</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;

    document.getElementById('answerSpeakBtn').onclick = () => {
      toggleSpeakKoreanSequence(items.map(w => w.korSentence));
    };
  }

  // =========================================================
  // 6) 초기화
  // =========================================================
  document.addEventListener('DOMContentLoaded', async () => {
    const newPuzzleBtn = document.getElementById('newPuzzleBtn');
    const lang = (typeof getSavedUserLang === 'function') ? getSavedUserLang() : 'en';
    currentLang = lang;
    if (typeof initRomanToggle === 'function') initRomanToggle(document.getElementById('ssToolbar'), typeof t === 'function' ? t('romanToggle') : undefined);

    try {
      WORDS = await loadTopikData(lang);
    } catch (e) {
      ssLoading.textContent = '데이터를 불러오지 못했어요: ' + e.message;
      return;
    }
    ssLoading.style.display = 'none';
    document.getElementById('pagCtrl').style.display = 'flex';

    function renderPuzzleWithLoading() {
      newPuzzleBtn.disabled = true;
      newPuzzleBtn.textContent = typeof t === 'function' ? t('generating') : '만드는 중...';
      setTimeout(() => {
        renderPuzzle();
        newPuzzleBtn.disabled = false;
        newPuzzleBtn.textContent = typeof t === 'function' ? t('newPuzzle') : '새 퍼즐 만들기';
      }, 30);
    }

    gradeSelect.value = currentGrade;
    renderPuzzleWithLoading();
    newPuzzleBtn.addEventListener('click', renderPuzzleWithLoading);

    gradeSelect.addEventListener('change', () => {
      currentGrade = gradeSelect.value;
      if (typeof saveGrade === 'function') saveGrade(Number(currentGrade));
      document.body.classList.remove('mode-answer');
      toggleAnswerBtn.textContent = typeof t === 'function' ? t('showAnswer') : '정답 보기';
      renderPuzzleWithLoading();
    });

    toggleAnswerBtn.addEventListener('click', () => {
      document.body.classList.toggle('mode-answer');
      const isAnswer = document.body.classList.contains('mode-answer');
      toggleAnswerBtn.textContent = typeof t === 'function' ? (isAnswer ? t('showProblem') : t('showAnswer')) : (isAnswer ? '문제 보기' : '정답 보기');
      if (isAnswer) {
        currentItems.forEach((item, idx) => {
          item.tokens.forEach((t, i) => {
            const slot = ssGrid.querySelector(`.ss-slot[data-item="${idx}"][data-slot="${i}"]`);
            if (slot) { slot.textContent = t.text; slot.classList.add('is-filled'); }
          });
        });
      }
    });

    document.getElementById('printBtn').addEventListener('click', () => {
      const num = String(puzzleCount).padStart(3, '0');
      const isAnswer = document.body.classList.contains('mode-answer');
      const suffix = isAnswer ? '정답' : '문제';
      const originalTitle = document.title;
      document.title = `ss${currentGrade}_${num}_${suffix}`;
      window.print();
      document.title = originalTitle;
    });

    lightbox.addEventListener('click', () => lightbox.classList.remove('is-open'));
  });
})();
</script>
<script src="js/nav-hangul.js"></script>
</body>
</html>
